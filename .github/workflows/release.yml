name: Release & Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-tauri-linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            asset: pake-linux-amd64-ubuntu22
          - os: ubuntu-24.04
            asset: pake-linux-amd64-ubuntu24
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install frontend dependencies
        run: pnpm install

      - name: Create frontend dist
        run: mkdir -p dist && echo '<html></html>' > dist/index.html

      - name: Build Tauri app
        run: |
          cd src-tauri
          cargo build --release
          cd ..

      - name: Prepare release asset
        run: |
          cp src-tauri/target/release/pake ${{ matrix.asset }}
          chmod +x ${{ matrix.asset }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  build-native-linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            asset: pake-native-linux-amd64-ubuntu22
          - os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            asset: pake-native-linux-arm64-ubuntu22
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            asset: pake-native-linux-amd64-ubuntu24
          - os: ubuntu-24.04
            target: aarch64-unknown-linux-gnu
            asset: pake-native-linux-arm64-ubuntu24
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install cross-compilation linker (ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Create build config
        run: |
          mkdir -p src-tauri-native/.pake
          echo '{"url":"https://example.com","app_name":"PakeNative","width":1200,"height":780}' > src-tauri-native/.pake/native_config.json

      - name: Build
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
          fi
          cargo build --release --manifest-path src-tauri-native/Cargo.toml --target ${{ matrix.target }}

      - name: Prepare release asset
        run: |
          cp src-tauri-native/target/${{ matrix.target }}/release/pake-native ${{ matrix.asset }}
          chmod +x ${{ matrix.asset }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release:
    needs: [build-tauri-linux, build-native-linux]
    if: always() && (needs.build-tauri-linux.result == 'success' || needs.build-native-linux.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: pake-*
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release-files
          find artifacts -type f -exec cp {} release-files/ \;
          ls -lh release-files/

      - name: Delete existing latest release
        run: |
          gh release delete latest --yes || true
          git push origin :refs/tags/latest || true
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f latest
          git push -f origin latest

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "latest"
          body: |
            ## Pake Latest Build

            **Commit**: ${{ github.sha }}

            ### Downloads

            #### Pake (Tauri WebView)
            | Platform | File |
            |----------|------|
            | Linux AMD64 (Ubuntu 22.04) | `pake-linux-amd64-ubuntu22` |
            | Linux AMD64 (Ubuntu 24.04) | `pake-linux-amd64-ubuntu24` |

            #### Pake Native (System Browser)
            | Platform | File |
            |----------|------|
            | Linux AMD64 (Ubuntu 22.04) | `pake-native-linux-amd64-ubuntu22` |
            | Linux ARM64 (Ubuntu 22.04) | `pake-native-linux-arm64-ubuntu22` |
            | Linux AMD64 (Ubuntu 24.04) | `pake-native-linux-amd64-ubuntu24` |
            | Linux ARM64 (Ubuntu 24.04) | `pake-native-linux-arm64-ubuntu24` |
          files: release-files/*
          prerelease: false
          draft: false
